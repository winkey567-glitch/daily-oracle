<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">

  <meta name="description" content="今日求卦结果 — Daily Oracle 每日一卦·链上存证">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <meta property="og:description" content="今日求卦结果 — 基于易经六十四卦的每日求卦 DApp">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="求卦结果 - Daily Oracle">
  <meta name="twitter:description" content="今日求卦结果 — Daily Oracle 每日一卦·链上存证">
  <link rel="manifest" href="manifest.json">
  <title>求卦结果 - Daily Oracle</title>
  <!-- Fonts: 使用系统本地字体，避免 Google Fonts 在国内被墙导致页面渲染阻塞 -->
  <style>
    :root {
      /* === 与首页完全同源的色板 === */
      --primary-400: #a78bfa;
      --primary-500: #7C5CC8;
      --primary-600: #6B4FB5;
      --primary-glow: rgba(124, 92, 200, 0.15);
      --accent-red: #C8553D;
      --accent-red-glow: rgba(200, 85, 61, 0.2);
      --gold: #D4AF37;
      --gold-light: #E8C95E;
      --gold-dim: rgba(212, 175, 55, 0.1);

      /* === 背景 — 首页同源暖纸色 === */
      --paper-warm: #e8e6e3;
      --paper-light: #f2f0ed;
      --paper-deep: #ddd9d3;

      /* === 玻璃面板（浅色系）=== */
      --glass-bg: rgba(255, 255, 255, 0.55);
      --glass-hover: rgba(255, 255, 255, 0.72);
      --glass-border: rgba(124, 92, 200, 0.12);
      --glass-border-active: rgba(124, 92, 200, 0.25);

      /* === 文字（深色 ink 系，适配浅背景）=== */
      --text-bright: #1a1a1a;
      --text-base: #3a3540;
      --text-dim: #6b6578;
      --text-faint: #9a94a8;

      /* === 效果 === */
      --shadow-card: 0 4px 24px rgba(60, 50, 80, 0.08), 0 1px 4px rgba(60, 50, 80, 0.04);
      --shadow-hover: 0 8px 36px rgba(60, 50, 80, 0.12), 0 2px 8px rgba(60, 50, 80, 0.06);
      --radius-lg: 16px;
      --radius-xl: 22px;
      --radius-2xl: 28px;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body, html {
      height: 100%;
      margin: 0; padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
      background: #d5d0c9;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-base);
    }

    /* === App Frame === */
    .app-frame {
      width: 100%;
      max-width: 430px;
      height: 100vh;
      height: 100dvh;
      position: relative;
      overflow: hidden;
      background: var(--paper-warm);
      display: flex;
      flex-direction: column;
    }

    @media (min-width: 431px) {
      .app-frame {
        height: 95vh;
        max-height: 850px;
        border-radius: 40px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.15), 0 0 0 8px rgba(255, 255, 255, 0.05);
      }
    }

    /* === 背景层 — 首页同源：暖纸 + 微妙紫金径向光 === */
    .bg-layer {
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 90% 60% at 50% -5%, rgba(124, 92, 200, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 15% 95%, rgba(212, 175, 55, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse 50% 50% at 85% 50%, rgba(124, 92, 200, 0.04) 0%, transparent 50%),
        var(--paper-warm);
    }

    /* 同心圆装饰 — 致敬首页 loading 的旋转环 */
    .bg-rings {
      position: absolute;
      top: 12%;
      left: 50%;
      transform: translateX(-50%);
      width: 260px;
      height: 260px;
      opacity: 0.06;
      pointer-events: none;
    }
    .bg-rings::before,
    .bg-rings::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      border: 1px solid var(--primary-500);
    }
    .bg-rings::before { inset: 0; }
    .bg-rings::after { inset: 36px; border-color: var(--gold); }

    /* === 飘落花瓣 — 与首页完全一致 === */
    .petals-container {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }
    .petal {
      position: absolute;
      width: 7px;
      height: 7px;
      background: var(--primary-400);
      border-radius: 50% 0 50% 50%;
      opacity: 0;
      animation: petal-fall linear infinite;
    }
    .petal:nth-child(1) { left: 8%; animation-duration: 10s; animation-delay: 0s; }
    .petal:nth-child(2) { left: 22%; animation-duration: 12s; animation-delay: 1.5s; }
    .petal:nth-child(3) { left: 38%; animation-duration: 9s; animation-delay: 0.8s; }
    .petal:nth-child(4) { left: 55%; animation-duration: 11s; animation-delay: 2.2s; }
    .petal:nth-child(5) { left: 72%; animation-duration: 13s; animation-delay: 0.3s; }
    .petal:nth-child(6) { left: 88%; animation-duration: 10s; animation-delay: 3s; }
    .petal:nth-child(7) { left: 16%; animation-duration: 11s; animation-delay: 4s; }
    .petal:nth-child(8) { left: 62%; animation-duration: 12s; animation-delay: 2.5s; }
    .petal:nth-child(9) { left: 45%; animation-duration: 9s; animation-delay: 5s; }
    @keyframes petal-fall {
      0% { transform: translateY(-20px) rotate(0deg) translateX(0); opacity: 0; }
      8% { opacity: 0.35; }
      92% { opacity: 0.35; }
      100% { transform: translateY(900px) rotate(720deg) translateX(40px); opacity: 0; }
    }

    /* === Content Layer === */
    .content-layer {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 16px 16px 28px;
      scrollbar-width: none;
    }
    .content-layer::-webkit-scrollbar { display: none; }

    /* === Header === */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0 12px;
    }

    .back-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s var(--ease-out);
    }
    .back-btn:hover {
      background: rgba(255, 255, 255, 0.75);
      border-color: var(--glass-border-active);
      transform: translateX(-2px);
    }
    .back-btn svg { width: 18px; height: 18px; stroke: var(--primary-500); }

    .header-title {
      font-family: Georgia, 'Times New Roman', 'Noto Serif SC', 'STSong', 'SimSun', 'Songti SC', 'PingFang SC', 'Microsoft YaHei', serif;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-dim);
      letter-spacing: 4px;
    }
    .header-right { width: 38px; }

    /* === Hero Gua Card — 神谕牌 === */
    .gua-card {
      position: relative;
      background:
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(124, 92, 200, 0.05) 0%, transparent 70%),
        var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-2xl);
      padding: 24px 18px 20px;
      text-align: center;
      overflow: hidden;
      margin-bottom: 10px;
      box-shadow: var(--shadow-card);
      transition: box-shadow 0.4s var(--ease-out);
    }
    .gua-card:hover { box-shadow: var(--shadow-hover); }

    /* 顶部金紫渐变线 */
    .gua-card::before {
      content: '';
      position: absolute;
      top: 0; left: 15%; right: 15%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary-400), var(--gold), var(--primary-400), transparent);
      opacity: 0.5;
    }

    /* 底部微光 */
    .gua-card::after {
      content: '';
      position: absolute;
      bottom: -50%; left: 50%;
      transform: translateX(-50%);
      width: 90%; height: 60%;
      background: radial-gradient(ellipse, rgba(124, 92, 200, 0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    .gua-stamp {
      position: absolute;
      top: 16px; right: 16px;
      width: 36px; height: 36px;
      border: 1.5px solid var(--gold);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, 'Times New Roman', 'Noto Serif SC', 'STSong', 'SimSun', 'Songti SC', 'PingFang SC', 'Microsoft YaHei', serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--gold);
      opacity: 0.7;
      transform: rotate(8deg);
      box-shadow: inset 0 0 8px rgba(212, 175, 55, 0.06);
    }

    .gua-label {
      font-size: 10px;
      color: var(--text-faint);
      letter-spacing: 3px;
      margin-bottom: 8px;
      text-transform: uppercase;
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
    }

    .gua-name {
      font-family: Georgia, 'Times New Roman', 'Noto Serif SC', 'STSong', 'SimSun', 'Songti SC', 'PingFang SC', 'Microsoft YaHei', serif;
      font-size: 34px;
      font-weight: 800;
      margin-bottom: 4px;
      background: linear-gradient(135deg, var(--text-bright) 0%, var(--primary-500) 50%, var(--text-bright) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
    }

    .gua-subtitle {
      font-size: 12px;
      color: var(--primary-600);
      font-weight: 500;
      margin-bottom: 18px;
      letter-spacing: 1px;
      opacity: 0.85;
    }

    /* === 六爻 — 水墨笔触风格 === */
    .gua-lines {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin: 8px 0 4px;
      position: relative;
      z-index: 1;
      min-height: 100px;
      justify-content: center;
    }

    .gua-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      opacity: 1;
      transform: translateY(0) scale(1);
      animation: line-in 0.6s var(--ease-spring) forwards;
    }
    .gua-line:nth-child(1) { animation-delay: 0.1s; }
    .gua-line:nth-child(2) { animation-delay: 0.2s; }
    .gua-line:nth-child(3) { animation-delay: 0.3s; }
    .gua-line:nth-child(4) { animation-delay: 0.4s; }
    .gua-line:nth-child(5) { animation-delay: 0.5s; }
    .gua-line:nth-child(6) { animation-delay: 0.6s; }

    @keyframes line-in {
      from { opacity: 0; transform: translateY(8px) scale(0.92); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .gua-position {
      font-size: 11px;
      color: var(--text-faint);
      width: 16px;
      text-align: right;
      font-family: Georgia, 'Times New Roman', 'Noto Serif SC', 'STSong', 'SimSun', 'Songti SC', 'PingFang SC', 'Microsoft YaHei', serif;
      flex-shrink: 0;
    }

    .gua-yang {
      width: 80px; height: 7px;
      background: linear-gradient(90deg, rgba(26,26,26,0.15), rgba(26,26,26,0.85), rgba(26,26,26,0.15));
      border-radius: 4px;
      position: relative;
      box-shadow: 0 1px 4px rgba(26, 26, 26, 0.12), 0 0 12px rgba(124, 92, 200, 0.06);
      flex-shrink: 0;
    }

    .gua-yin {
      display: flex; gap: 10px;
      position: relative;
      flex-shrink: 0;
    }
    .gua-yin span {
      width: 34px; height: 7px;
      background: linear-gradient(90deg, rgba(26,26,26,0.15), rgba(26,26,26,0.85), rgba(26,26,26,0.15));
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(26, 26, 26, 0.12), 0 0 12px rgba(124, 92, 200, 0.06);
    }

    /* 变爻 — 红色 */
    .gua-line.changing .gua-yang,
    .gua-line.changing .gua-yin span {
      background: linear-gradient(90deg, rgba(200,85,61,0.4), var(--accent-red), rgba(200,85,61,0.4));
      box-shadow: 0 0 8px var(--accent-red-glow), 0 1px 3px rgba(200, 85, 61, 0.15);
    }

    .gua-change-marker {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      font-size: 13px;
      font-weight: 700;
      color: var(--accent-red);
      pointer-events: none;
      text-shadow: 0 0 6px rgba(255, 255, 255, 0.9);
      z-index: 2;
    }

    .gua-divider {
      width: 56px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary-400), transparent);
      margin: 14px auto 12px;
      opacity: 0.5;
    }

    .gua-meaning {
      font-family: Georgia, 'Times New Roman', 'Noto Serif SC', 'STSong', 'SimSun', 'Songti SC', 'PingFang SC', 'Microsoft YaHei', serif;
      font-size: 13px;
      color: var(--text-base);
      line-height: 1.7;
      padding: 0 8px;
      letter-spacing: 1px;
    }

    /* === 变卦区域 === */
    .changed-section {
      background: linear-gradient(135deg, rgba(200, 85, 61, 0.06), rgba(200, 85, 61, 0.02));
      border-radius: var(--radius-lg);
      padding: 12px 16px;
      margin-bottom: 10px;
      border: 1px dashed rgba(200, 85, 61, 0.2);
      text-align: center;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .changed-label {
      font-size: 10px;
      color: var(--accent-red);
      letter-spacing: 3px;
      margin-bottom: 5px;
      opacity: 0.85;
    }
    .changed-name {
      font-family: Georgia, 'Times New Roman', 'Noto Serif SC', 'STSong', 'SimSun', 'Songti SC', 'PingFang SC', 'Microsoft YaHei', serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--text-bright);
    }
    .changed-desc {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 6px;
      line-height: 1.7;
      opacity: 0.85;
    }

    /* === 详情卡片 === */
    .detail-card {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      padding: 10px;
      margin-bottom: 8px;
      transition: all 0.3s ease;
      box-shadow: var(--shadow-card);
    }
    .detail-card:hover {
      border-color: var(--glass-border-active);
      box-shadow: var(--shadow-hover);
    }

    .detail-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }
    .detail-icon {
      width: 24px; height: 24px;
      border-radius: 6px;
      background: linear-gradient(135deg, rgba(124, 92, 200, 0.12), rgba(212, 175, 55, 0.08));
      border: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--primary-500);
    }
    .detail-title {
      font-family: Georgia, 'Times New Roman', 'Noto Serif SC', 'STSong', 'SimSun', 'Songti SC', 'PingFang SC', 'Microsoft YaHei', serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-bright);
      letter-spacing: 1px;
    }

    .detail-content {
      font-size: 12px;
      color: var(--text-base);
      line-height: 1.7;
      letter-spacing: 0.5px;
    }

    .detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    /* === 卦象 + 解读 左右并排 === */
    .gua-interpretation-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .gua-interpretation-row .gua-card {
      flex: 1 1 48%;
      margin-bottom: 0;
      padding: 18px 12px 14px;
    }
    .gua-interpretation-row .gua-card::before { left: 8%; right: 8%; }
    .gua-interpretation-row .gua-name { font-size: 22px; letter-spacing: 1px; }
    .gua-interpretation-row .gua-subtitle { font-size: 10px; margin-bottom: 10px; }
    .gua-interpretation-row .gua-label { font-size: 9px; margin-bottom: 4px; letter-spacing: 2px; }
    .gua-interpretation-row .gua-yang { width: 54px; height: 5px; }
    .gua-interpretation-row .gua-yin span { width: 22px; height: 5px; }
    .gua-interpretation-row .gua-yin { gap: 6px; }
    .gua-interpretation-row .gua-lines { gap: 5px; min-height: 64px; margin: 6px 0 2px; }
    .gua-interpretation-row .gua-line { gap: 6px; }
    .gua-interpretation-row .gua-position { font-size: 9px; width: 12px; }
    .gua-interpretation-row .gua-divider { margin: 10px auto 8px; width: 40px; }
    .gua-interpretation-row .gua-meaning { font-size: 11px; line-height: 1.5; padding: 0 4px; }
    .gua-interpretation-row .gua-stamp { width: 28px; height: 28px; font-size: 10px; top: 10px; right: 10px; }
    .gua-interpretation-row .detail-card {
      flex: 1 1 48%;
      margin-bottom: 0;
      padding: 12px 12px 10px;
      display: flex;
      flex-direction: column;
    }
    .gua-interpretation-row .detail-header { margin-bottom: 8px; }
    .gua-interpretation-row .detail-icon { width: 26px; height: 26px; font-size: 12px; border-radius: 6px; }
    .gua-interpretation-row .detail-title { font-size: 12px; }
    .gua-interpretation-row .detail-content { font-size: 11px; line-height: 1.6; flex: 1; }
    .gua-interpretation-row .detail-tags { margin-top: 8px; gap: 4px; }
    .gua-interpretation-row .detail-tag { padding: 3px 8px; font-size: 9px; }
    .detail-tag {
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1px;
    }
    .tag-primary { background: rgba(124, 92, 200, 0.08); color: var(--primary-600); border: 1px solid rgba(124, 92, 200, 0.15); }
    .tag-success { background: rgba(46, 125, 50, 0.08); color: #2e7d32; border: 1px solid rgba(46, 125, 50, 0.15); }
    .tag-warning { background: rgba(230, 81, 0, 0.08); color: #e65100; border: 1px solid rgba(230, 81, 0, 0.15); }
    .tag-info { background: rgba(21, 101, 192, 0.08); color: #1565c0; border: 1px solid rgba(21, 101, 192, 0.15); }

    /* === 运势网格 === */
    .fortune-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 0 6px;
    }
    .fortune-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 7px 14px;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 5px;
      border: 1px solid var(--glass-border);
      transition: all 0.3s ease;
    }
    .fortune-item:hover {
      background: rgba(255, 255, 255, 0.6);
      border-color: var(--glass-border-active);
    }
    .fortune-icon { font-size: 12px; color: var(--primary-500); flex-shrink: 0; }
    .fortune-info { display: flex; align-items: center; justify-content: space-between; gap: 50px; flex: 1; min-width: 0; }
    .fortune-label { font-size: 10px; color: var(--text-faint); letter-spacing: 3px; white-space: nowrap; }
    .fortune-stars { font-size: 12px; letter-spacing: 1px; white-space: nowrap; }

    /* === 区块链区域 === */
    .blockchain-section {
      border-radius: var(--radius-xl);
      padding: 14px;
      margin-bottom: 8px;
      transition: all 0.5s ease;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }
    .blockchain-section::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(255,255,255,0.3) 0%, transparent 60%);
      pointer-events: none;
    }
    .blockchain-section.pending {
      background: linear-gradient(135deg, rgba(124, 92, 200, 0.1), rgba(124, 92, 200, 0.04));
      border: 1px solid rgba(124, 92, 200, 0.15);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .blockchain-section.attested {
      background: linear-gradient(135deg, rgba(46, 125, 50, 0.1), rgba(46, 125, 50, 0.04));
      border: 1px solid rgba(46, 125, 50, 0.18);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .blockchain-section.signing,
    .blockchain-section.sending {
      background: linear-gradient(135deg, rgba(124, 92, 200, 0.14), rgba(124, 92, 200, 0.06));
      border: 1px solid rgba(124, 92, 200, 0.22);
      animation: pulse-bg 2s ease-in-out infinite;
    }
    .blockchain-section.error {
      background: linear-gradient(135deg, rgba(198, 40, 40, 0.1), rgba(198, 40, 40, 0.04));
      border: 1px solid rgba(198, 40, 40, 0.18);
    }
    @keyframes pulse-bg { 0%,100% { opacity: 1; } 50% { opacity: 0.88; } }

    .blockchain-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-base);
      letter-spacing: 0.5px;
      position: relative;
    }

    .blockchain-steps {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 8px;
      font-size: 10px;
      opacity: 0.6;
      position: relative;
    }
    .blockchain-step {
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.3s ease;
      color: var(--text-dim);
    }
    .blockchain-step.done { opacity: 1; color: #2e7d32; }
    .blockchain-step.current { opacity: 1; color: var(--text-bright); font-weight: 600; }
    .step-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.15);
      transition: all 0.3s ease;
    }
    .blockchain-step.done .step-dot { background: #2e7d32; box-shadow: 0 0 4px rgba(46, 125, 50, 0.3); }
    .blockchain-step.current .step-dot { background: var(--primary-500); animation: pulse-dot 1.5s ease-in-out infinite; box-shadow: 0 0 4px var(--primary-glow); }
    .step-arrow { color: rgba(0, 0, 0, 0.15); margin: 0 2px; }

    .blockchain-hash {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 10px;
      word-break: break-all;
      opacity: 0.65;
      line-height: 1.7;
      background: rgba(0, 0, 0, 0.04);
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(0, 0, 0, 0.04);
      color: var(--text-base);
      position: relative;
    }

    .blockchain-status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      font-size: 11px;
      opacity: 0.75;
      color: var(--text-dim);
      position: relative;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #2e7d32;
      box-shadow: 0 0 4px rgba(46, 125, 50, 0.3);
    }
    .status-dot.pending {
      background: var(--primary-500);
      animation: pulse-dot 2s ease-in-out infinite;
      box-shadow: 0 0 4px var(--primary-glow);
    }
    @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    .blockchain-explorer {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding: 6px 12px;
      background: rgba(46, 125, 50, 0.08);
      border-radius: 16px;
      font-size: 10px;
      color: #2e7d32;
      text-decoration: none;
      transition: all 0.3s ease;
      border: 1px solid rgba(46, 125, 50, 0.12);
      position: relative;
    }
    .blockchain-explorer:hover {
      background: rgba(46, 125, 50, 0.12);
      transform: translateY(-1px);
      border-color: rgba(46, 125, 50, 0.25);
    }
    .blockchain-explorer svg { width: 12px; height: 12px; }

    /* === 操作按钮 === */
    .action-bar {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }
    .action-bar-btn {
      flex: 1;
      padding: 12px 12px;
      border-radius: var(--radius-lg);
      border: none;
      font-family: Georgia, 'Times New Roman', 'Noto Serif SC', 'STSong', 'SimSun', 'Songti SC', 'PingFang SC', 'Microsoft YaHei', serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s var(--ease-out);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      letter-spacing: 1px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary-500), var(--primary-600));
      color: white;
      box-shadow: 0 4px 16px rgba(124, 92, 200, 0.25);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(124, 92, 200, 0.35);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--text-bright);
      border: 1px solid var(--glass-border);
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.7);
      border-color: var(--glass-border-active);
      transform: translateY(-2px);
    }
    .btn-secondary:active { transform: translateY(0); }

    /* === Toast === */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(30, 25, 40, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: white;
      padding: 11px 24px;
      border-radius: 20px;
      font-size: 12px;
      z-index: 1000;
      opacity: 0;
      transition: all 0.4s var(--ease-out);
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(124, 92, 200, 0.15);
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(46, 125, 50, 0.3); }
    .toast.error { border-color: rgba(198, 40, 40, 0.3); }

    /* === 入场动画 === */
    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slide-in {
      from { opacity: 0; transform: translateX(-14px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .anim-fade-up { animation: fade-in-up 0.7s var(--ease-out) forwards; opacity: 0; }
    .anim-slide-in { animation: slide-in 0.5s var(--ease-out) forwards; opacity: 0; }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.25s; }
    .delay-3 { animation-delay: 0.4s; }
    .delay-4 { animation-delay: 0.55s; }
    .delay-5 { animation-delay: 0.7s; }

    /* === 响应式 === */
    @media (max-width: 375px) {
      .content-layer { padding: 16px 16px 30px; }
      .gua-name { font-size: 28px; }
      .gua-yang { width: 70px; height: 6px; }
      .gua-yin span { width: 30px; height: 6px; }
      .gua-lines { gap: 8px; min-height: 100px; }
    }

    @media (max-height: 700px) {
      .content-layer { padding: 12px 14px 22px; }
      .gua-card { padding: 20px 16px 18px; }
      .gua-name { font-size: 26px; }
      .gua-lines { gap: 6px; min-height: 90px; }
      .detail-card { padding: 12px; margin-bottom: 6px; }
      .changed-section { padding: 10px 14px; }
      .blockchain-section { padding: 12px; }
    }

    @media (max-width: 640px) {
      .fortune-grid { grid-template-columns: 1fr; gap: 6px; padding: 0; }
      .fortune-item { padding: 5px 10px; gap: 6px; }
      .fortune-info { gap: 10px; }
      .fortune-label { font-size: 10px; letter-spacing: 2px; }
      .fortune-stars { font-size: 11px; }
      .fortune-icon { font-size: 11px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .petal { animation: none; }
      .anim-fade-up, .anim-slide-in { animation: none; opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="app-frame">
    <!-- 背景 -->
    <div class="bg-layer">
      <div class="bg-rings"></div>
    </div>

    <!-- 飘落花瓣 — 与首页一致 -->
    <div class="petals-container">
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
    </div>

    <!-- 内容 -->
    <div class="content-layer">
      <!-- Header -->
      <div class="header anim-slide-in">
        <button class="back-btn" onclick="window.location.href='index.html'" aria-label="返回">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
        </button>
        <div class="header-title">今日卦象</div>
        <div class="header-right"></div>
      </div>

      <!-- Gua + Interpretation Row (左右并排) -->
      <div class="gua-interpretation-row anim-fade-up delay-1">
        <!-- Hero Gua Card (左) -->
        <div class="gua-card">
          <div class="gua-stamp">神谕</div>
          <div class="gua-label" id="guaDate">乙巳年 六月初一</div>
          <div class="gua-name" id="guaName">--</div>
          <div class="gua-subtitle" id="guaSubtitle">--</div>
          <div class="gua-lines" id="guaLines"></div>
          <div class="gua-divider"></div>
          <div class="gua-meaning" id="guaMeaning">--</div>
        </div>

        <!-- Interpretation Card (右) -->
        <div class="detail-card">
          <div class="detail-header">
            <div class="detail-icon">◈</div>
            <div class="detail-title">卦象解读</div>
          </div>
          <div class="detail-content" id="interpretation">--</div>
          <div class="detail-tags" id="detailTags"></div>
        </div>
      </div>

      <!-- Changed Hexagram -->
      <div class="changed-section anim-fade-up delay-2" id="changedSection" style="display:none;">
        <div class="changed-label">动爻变化</div>
        <div class="changed-name" id="changedName">--</div>
        <div class="changed-desc" id="changedDesc">--</div>
      </div>

      <!-- Fortune Card -->
      <div class="detail-card anim-fade-up delay-3">
        <div class="detail-header">
          <div class="detail-icon">✦</div>
          <div class="detail-title">今日运势</div>

        <div class="detail-content">
          <div class="fortune-grid" id="fortuneGrid"></div>

      <!-- Blockchain -->
      <div class="blockchain-section pending anim-fade-up delay-4" id="blockchainSection">
        <div class="blockchain-header">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
          <span id="chainTitle">X Layer 测试网 · 链上存证</span>
        </div>
        <div class="blockchain-steps" id="chainSteps">
          <div class="blockchain-step" id="stepSwitch"><span class="step-dot"></span>切网</div>
          <span class="step-arrow">→</span>
          <div class="blockchain-step" id="stepSign"><span class="step-dot"></span>签名</div>
          <span class="step-arrow">→</span>
          <div class="blockchain-step" id="stepSend"><span class="step-dot"></span>上链</div>
        </div>
        <div class="blockchain-hash" id="chainHash">尚未上链存证</div>
        <div class="blockchain-status" id="chainStatus">
          <div class="status-dot pending" id="chainStatusDot"></div>
          <span id="chainStatusText">点击下方按钮，将卦象写入 X Layer 测试网</span>
        </div>
        <a class="blockchain-explorer" id="chainExplorer" style="display:none;" href="#" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
          在区块浏览器中查看
        </a>
      </div>

      <!-- Actions -->
      <div class="action-bar anim-fade-up delay-5">
        <button class="action-bar-btn btn-secondary" onclick="shareResult()" id="shareBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/>
            <polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/>
          </svg>
          分享
        </button>
        <button class="action-bar-btn btn-primary" onclick="saveToChain()" id="saveBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
          </svg>
          <span id="saveBtnText">存证上链</span>
        </button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="oracle-core.js"></script>
  <script>
    // ============================================================
    // Read URL params (IIFE — return 需在函数体内)
    // ============================================================
    (function() {
    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get('id')) || 1;
    const changingStr = params.get('changing') || '';
    const changingLines = changingStr ? changingStr.split(',').map(Number).filter(n => !isNaN(n)) : [];
    const changedId = params.get('changedId') || '';
    const changedName = params.get('changedName') || '';
    const recordId = params.get('recordId') || '';
    const fortuneLevel = params.get('fortune') || '';

    const hex = HEXAGRAMS[id];
    if (!hex) { document.body.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100vh;color:#1a1a1a;font-size:18px;">卦象数据错误</div>'; return; }

    // ============================================================
    // Helpers
    // ============================================================
    function showToast(text, type) {
      const t = document.getElementById('toast');
      t.textContent = text;
      t.className = 'toast ' + (type || '');
      requestAnimationFrame(() => t.classList.add('show'));
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function getLunarDate() {
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth() + 1;
      const day = now.getDate();
      const gan = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
      const zhi = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
      const ganIdx = (year - 4) % 10;
      const zhiIdx = (year - 4) % 12;
      const cnMonths = ['正','二','三','四','五','六','七','八','九','十','冬','腊'];
      const cnDays = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
        '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
        '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
      return gan[ganIdx] + zhi[zhiIdx] + '年 ' + cnMonths[month-1] + '月' + cnDays[day-1];
    }

    function renderStars(level) {
      const stars = ['★','★','★','★','★'];
      const filled = level || 3;
      return stars.map((s, i) =>
        i < filled
          ? '<span style="color:var(--gold);">' + s + '</span>'
          : '<span style="color:rgba(0,0,0,0.1);">' + s + '</span>'
      ).join('');
    }

    // ============================================================
    // Render Gua Card
    // ============================================================
    function renderGuaCard() {
      document.getElementById('guaDate').textContent = getLunarDate();
      document.getElementById('guaName').textContent = hex.name;
      document.getElementById('guaSubtitle').textContent = '第' + id + '卦 · ' + hex.fortune + '卦';
      document.getElementById('guaMeaning').textContent = hex.image;

      const binary = hex.binary;
      const container = document.getElementById('guaLines');
      const positionNames = ['六','五','四','三','二','初'];
      let html = '';
      for (let i = 0; i < 6; i++) {
        const bit = binary[i];
        const lineIndex = 5 - i;
        const isYang = bit === '1';
        const isChanging = changingLines.includes(lineIndex);
        const posName = positionNames[i];
        const changeMarker = isChanging ? '<div class="gua-change-marker">' + (isYang ? '○' : '×') + '</div>' : '';
        const lineClass = isChanging ? 'gua-line changing' : 'gua-line';
        if (isYang) {
          html += '<div class="' + lineClass + '"><span class="gua-position">' + posName + '</span><div class="gua-yang">' + changeMarker + '</div></div>';
        } else {
          html += '<div class="' + lineClass + '"><span class="gua-position">' + posName + '</span><div class="gua-yin"><span></span><span></span>' + changeMarker + '</div></div>';
        }
      }
      container.innerHTML = html;
    }

    // ============================================================
    // Render Changed Hexagram
    // ============================================================
    function renderChanged() {
      if (changedId && changedName) {
        const section = document.getElementById('changedSection');
        section.style.display = 'block';
        document.getElementById('changedName').textContent = '之' + changedName;
        const changedHex = HEXAGRAMS[changedId];
        if (changedHex) {
          document.getElementById('changedDesc').textContent = '动爻变化后，本卦「' + hex.name + '」化为「' + changedName + '」。' + changedHex.reading.slice(0, 60) + '…';
        }
      }
    }

    // ============================================================
    // Render Interpretation & Tags
    // ============================================================
    function renderInterpretation() {
      document.getElementById('interpretation').textContent = hex.reading;
      const tagsContainer = document.getElementById('detailTags');
      const tagClasses = ['tag-success', 'tag-primary', 'tag-warning', 'tag-info'];
      let html = '';
      (hex.tags || []).forEach((tag, i) => {
        html += '<span class="detail-tag ' + tagClasses[i % tagClasses.length] + '">' + tag + '</span>';
      });
      tagsContainer.innerHTML = html;
    }

    // ============================================================
    // Render Fortune Grid
    // ============================================================
    function renderFortune() {
      const level = hex.level || 3;
      const items = [
        { icon: '◈', label: '事业', stars: level },
        { icon: '◈', label: '财运', stars: Math.max(1, level - 1) },
        { icon: '◈', label: '感情', stars: Math.min(5, level + 1) },
        { icon: '◈', label: '健康', stars: level }
      ];
      const container = document.getElementById('fortuneGrid');
      container.innerHTML = items.map(item =>
        '<div class="fortune-item">' +
          '<div class="fortune-icon">' + item.icon + '</div>' +
          '<div class="fortune-info">' +
            '<span class="fortune-label">' + item.label + '</span>' +
            '<span class="fortune-stars">' + renderStars(item.stars) + '</span>' +
          '</div>' +
        '</div>'
      ).join('');
    }

    // ============================================================
    // Blockchain Section
    // ============================================================
    let isAttested = false;
    let attestationTxHash = null;
    let attestationSig = null;

    function checkAttestation() {
      const history = getHistory();
      const record = history.find(r => String(r.id) === String(recordId));
      if (record && record.txHash) {
        isAttested = true;
        attestationTxHash = record.txHash;
        attestationSig = record.signature || null;
        renderAttested();
      }
    }

    function renderAttested() {
      const section = document.getElementById('blockchainSection');
      const title = document.getElementById('chainTitle');
      const hash = document.getElementById('chainHash');
      const statusText = document.getElementById('chainStatusText');
      const dot = document.getElementById('chainStatusDot');
      const saveBtn = document.getElementById('saveBtn');
      const saveBtnText = document.getElementById('saveBtnText');
      const explorer = document.getElementById('chainExplorer');

      section.className = 'blockchain-section attested anim-fade-up delay-4';
      title.textContent = 'X Layer 测试网 · 已上链存证';
      hash.textContent = attestationTxHash;
      statusText.textContent = '交易已确认，卦象永存链上 · 不可篡改';
      dot.className = 'status-dot';
      saveBtn.disabled = true;
      saveBtnText.textContent = '已存证';

      if (attestationTxHash) {
        explorer.style.display = 'inline-flex';
        explorer.href = 'https://www.okx.com/web3/explorer/xlayer-test/tx/' + attestationTxHash;
      }

      updateSteps('done', 'done', 'done');
    }

    function updateSteps(sw, si, se) {
      const steps = { stepSwitch: sw, stepSign: si, stepSend: se };
      const names = { done: 'done', current: 'current' };
      Object.keys(steps).forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.className = 'blockchain-step ' + (names[steps[id]] || '');
      });
    }

    // ============================================================
    // Share
    // ============================================================
    window.shareResult = function() {
      const text = '【Daily Oracle 每日一卦】\n' +
        hex.name + ' · ' + hex.fortune + '卦\n' +
        hex.reading.slice(0, 80) + '…\n\n' +
        '卦象启示未来，链上见证当下\n' +
        '——来自 Daily Oracle';

      if (navigator.share) {
        navigator.share({ title: hex.name, text: text }).catch(() => {});
      } else if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => {
          showToast('卦象文案已复制到剪贴板', 'success');
        }).catch(() => {
          showToast('复制失败，请手动复制', 'error');
        });
      } else {
        showToast('请手动复制分享', 'error');
      }
    }

    // ============================================================
    // Save to Chain (Sign + SendTransaction on X Layer Testnet)
    // ============================================================
    window.saveToChain = async function() {
      if (isAttested) return;

      const btn = document.getElementById('saveBtn');
      const btnText = document.getElementById('saveBtnText');
      const section = document.getElementById('blockchainSection');
      const statusText = document.getElementById('chainStatusText');
      const hashEl = document.getElementById('chainHash');

      btn.disabled = true;
      btnText.textContent = '签名中…';
      section.className = 'blockchain-section signing anim-fade-up delay-4';
      statusText.textContent = '请在 OKX 钱包中确认网络切换并签名…';
      hashEl.textContent = '等待钱包确认…';
      updateSteps('current', '', '');

      const message = 'Daily Oracle 链上存证\n' +
        '卦象: ' + hex.name + ' (' + hex.fortune + '卦)\n' +
        '卦辞: ' + hex.judgment + '\n' +
        '时间: ' + new Date().toISOString().slice(0, 10) + '\n' +
        'X Layer Testnet · Chain ID: 1952';

      const result = await sendOnChainAttestation(message);

      if (!result) {
        btn.disabled = false;
        btnText.textContent = '存证上链';
        section.className = 'blockchain-section error anim-fade-up delay-4';
        statusText.textContent = '存证失败，请检查钱包连接后重试';
        hashEl.textContent = '交易未完成';
        updateSteps('done', 'done', '');
        showToast('存证失败，请重试', 'error');
        return;
      }

      if (result.cancelled) {
        btn.disabled = false;
        btnText.textContent = '存证上链';
        section.className = 'blockchain-section pending anim-fade-up delay-4';
        statusText.textContent = '点击下方按钮，将卦象写入 X Layer 测试网';
        hashEl.textContent = '尚未上链存证';
        updateSteps('', '', '');
        showToast('已取消存证', 'error');
        return;
      }

      updateSteps('done', 'done', 'current');
      btnText.textContent = '交易确认中…';
      section.className = 'blockchain-section sending anim-fade-up delay-4';
      statusText.textContent = '交易已发送，等待链上确认…';
      hashEl.textContent = result.txHash;

      attestationTxHash = result.txHash;
      attestationSig = result.signature;
      isAttested = true;

      if (recordId) {
        updateAttestationRecord(recordId, result.txHash, result.signature);
      }

      renderAttested();
      showToast('链上存证成功！', 'success');
    }

    // ============================================================
    // Initialize
    // ============================================================
    renderGuaCard();
    renderChanged();
    renderInterpretation();
    renderFortune();
    checkAttestation();
    })();
  </script>
</body>
</html>
